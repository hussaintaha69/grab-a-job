<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body {
    width: 280px;
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #FAF8F3;
    color: #1F2A44;
  }
  h1 {
    font-size: 15px;
    margin: 0 0 12px;
    font-weight: 600;
  }
  button {
    font-family: "Courier New", monospace;
    font-size: 12px;
    padding: 8px 12px;
    border: 1px solid #1F2A44;
    background: transparent;
    color: #1F2A44;
    border-radius: 2px;
    cursor: pointer;
    width: 100%;
    margin-bottom: 8px;
  }
  button:hover {
    background: #1F2A44;
    color: #FAF8F3;
  }
  input {
    width: 100%;
    box-sizing: border-box;
    padding: 7px 8px;
    margin-bottom: 8px;
    border: 1px solid #E4DFD3;
    border-radius: 2px;
    font-family: "Courier New", monospace;
    font-size: 11px;
    background: #fff;
    color: #1F2A44;
  }
  #status {
    font-size: 11px;
    color: #8A8578;
    margin-top: 4px;
    min-height: 14px;
    line-height: 1.4;
  }
  .hidden {
    display: none;
  }
  .link-btn {
    background: none;
    border: none;
    color: #2F6F9E;
    text-decoration: underline;
    width: auto;
    padding: 0;
    font-size: 11px;
    margin-bottom: 0;
  }
  .helper {
    font-size: 11px;
    color: #8A8578;
    margin: 0 0 10px;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <h1>Grab a Job</h1>

  <div id="setup-view">
    <p class="helper">
      Sign in to the web app first, then paste your personal token from its
      Settings page.
    </p>
    <button id="open-app-btn">Open app to sign in</button>
    <input id="token-input" type="text" placeholder="Paste your token here" />
    <button id="save-token-btn">Save token</button>
  </div>

  <div id="grab-view" class="hidden">
    <button id="grab-btn">Grab this job</button>
    <button id="forget-btn" class="link-btn">Not you? Sign out</button>
  </div>

  <p id="status"></p>

  <script src="popup.js"></script>
</body>
</html>
